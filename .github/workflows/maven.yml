# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: RESOLVE (Custom Java CI with Maven)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # This job checks that our Java files have the proper license header.
  check_license:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Run License Validation Check
        run: mvn license:check
  # This job checks that our code styles are the same.
  check_style:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Run Formatter Validation Check
        run: mvn formatter:validate

  # This job runs our JUnit tests.
  junit:

    strategy:
      matrix:
        java-dist: [ 'corretto', 'liberica', 'microsoft', 'temurin', 'semeru', 'zulu' ]
        java: [ '21' ]
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ matrix.java-dist }}
          java-version: ${{ matrix.java }}
#      - name: Generate New JAR files
#        run: mvn clean package -DskipTests
#      - name: Generate VCs
#        shell: bash
#        run: |
#          chmod +x "${GITHUB_WORKSPACE}/bin/vcgen.sh"
#          "${GITHUB_WORKSPACE}/bin/vcgen.sh"
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Run JUnit Tests on Windows
        if: runner.os == 'Windows'
        run: mvn test -B
        shell: pwsh

      - name: Run JUnit Tests on Linux/macOS
        if: runner.os != 'Windows'
        run: mvn test -B
        shell: bash

  # This job runs the RESOLVE prover on files we expect to prove.
  prove:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build
        run: mvn package -DskipTests -B
      - name: Copy dependencies
        run: mvn dependency:copy-dependencies -DoutputDirectory=target/deps -B
      - name: Prove Obvious_Flipping_Realiz
        working-directory: RESOLVE-Workspace/Main/Concepts/Stack_Template
        timeout-minutes: 5
        run: |
          java -cp "$GITHUB_WORKSPACE/target/classes:$GITHUB_WORKSPACE/target/deps/*" \
            edu.clemson.rsrg.Main -addConstraints -sprove Obvious_Flipping_Realiz.rb 2>&1 | tee prove_flipping.txt
      - name: Prove Inject_Front_Realiz
        working-directory: RESOLVE-Workspace/Main/Concepts/Queue_Template
        timeout-minutes: 5
        run: |
          java -cp "$GITHUB_WORKSPACE/target/classes:$GITHUB_WORKSPACE/target/deps/*" \
            edu.clemson.rsrg.Main -addConstraints -sprove Inject_Front_Realiz.rb 2>&1 | tee prove_inject.txt
      - name: Proof summary
        if: always()
        run: |
          echo "### Proof Results" >> $GITHUB_STEP_SUMMARY
          echo "| File | Proved | Not Proved | Total |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|------------|-------|" >> $GITHUB_STEP_SUMMARY
          for FILE in \
            "RESOLVE-Workspace/Main/Concepts/Stack_Template/prove_flipping.txt:Obvious_Flipping_Realiz" \
            "RESOLVE-Workspace/Main/Concepts/Queue_Template/prove_inject.txt:Inject_Front_Realiz"; do
            PATH_PART="${FILE%%:*}"
            NAME="${FILE##*:}"
            if [ -f "$PATH_PART" ]; then
              PROVED=$(grep -c "Proved" "$PATH_PART" || echo 0)
              NOT_PROVED=$(grep -c "Not Proved" "$PATH_PART" || echo 0)
              PROVED=$((PROVED - NOT_PROVED))
              TOTAL=$((PROVED + NOT_PROVED))
              echo "| $NAME | $PROVED | $NOT_PROVED | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $NAME | - | - | DID NOT RUN |" >> $GITHUB_STEP_SUMMARY
            fi
          done
      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-results
          path: |
            RESOLVE-Workspace/Main/Concepts/Stack_Template/*.proof
            RESOLVE-Workspace/Main/Concepts/Queue_Template/*.proof
          if-no-files-found: warn

